name: branch-protection

# Self-applying branch protection for `master`. Runs on:
#   - manual `workflow_dispatch` (initial setup, or to re-assert after a
#     manual UI tweak)
#   - every `push` to `master` (defense against drift — last merged commit
#     wins, so if someone disables a required check by hand it's restored
#     on the next merge)
#
# Required status checks are the two jobs published by `test.yml`:
#   - ci / shellcheck
#   - ci / test (tests/test-worktree-naming-guard.sh)
#
# # Why a PAT secret instead of `GITHUB_TOKEN` + `permissions: administration`
#
# `administration` is NOT a supported scope of the `GITHUB_TOKEN`
# permissions block. The official scope list at
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
# is `actions / attestations / checks / contents / deployments /
# discussions / id-token / issues / models / packages / pages /
# pull-requests / repository-projects / security-events / statuses`.
# There IS a fine-grained PAT repository permission called
# "Administration" (which the Branches Protection API requires), but it
# cannot be minted into `GITHUB_TOKEN`. Declaring `administration: write`
# at the workflow `permissions:` block parses fine but fails authorization
# at registration time, which GitHub records as a 0-job failure run on
# every push to any branch — same root cause as ippoan/ci-workflows#23
# (see [PR ippoan/ci-workflows#25](https://github.com/ippoan/ci-workflows/pull/25)
# and the `gh-actions-phantom-permission` skill for the full write-up).
#
# This file therefore requires the repo to provide a `TAG_RELEASE_PAT`
# secret — a fine-grained PAT (or GitHub App installation token) with
# "Administration: write" + "Contents: read" repository permissions on
# this repo. The `permissions:` block only declares scopes that
# `GITHUB_TOKEN` actually supports.
#
# Until the secret is set, this workflow will fail at runtime with a 403
# from the Branches API. Repo admin still has to flip "Allow auto-merge"
# in Settings → General once (no API endpoint covers that toggle).

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection on master
        env:
          GH_TOKEN: ${{ secrets.TAG_RELEASE_PAT }}
        run: |
          gh api -X PUT \
            "repos/${{ github.repository }}/branches/master/protection" \
            -H "Accept: application/vnd.github+json" \
            -F required_status_checks[strict]=true \
            -F required_status_checks[contexts][]='ci / shellcheck' \
            -F required_status_checks[contexts][]='ci / test (tests/test-worktree-naming-guard.sh)' \
            -F enforce_admins=false \
            -f required_pull_request_reviews= \
            -f restrictions= \
            -F required_linear_history=false \
            -F allow_force_pushes=false \
            -F allow_deletions=false \
            -F required_conversation_resolution=true
